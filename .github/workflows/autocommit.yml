name: Auto commit

on:
  schedule:
    - cron: "0 0 * * *" # Once per day at midnight UTC, makes 4-10 commits

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Auto Commit
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --local user.email "arberbakalli@gmail.com"
          git config --local user.name "arberbakalli"

          arr[0]="chore(bot): 😂 auto commit"
          arr[1]="chore(bot): 😱 auto commit"
          arr[2]="chore(bot): 👿 auto commit"
          arr[3]="chore(bot): 💩 auto commit"
          arr[4]="chore(bot): 🙏 auto commit"
          arr[5]="chore(bot): 🙈 auto commit"
          arr[6]="chore(bot): 🐐 auto commit"
          arr[7]="chore(bot): 🤖 auto commit"
          arr[8]="chore(bot): 🟩 auto commit"
          arr[9]="chore(bot): 👻 auto commit"

          # Random number of commits: 4 to 10
          num_commits=$(( ($RANDOM % 7) + 4 ))
          echo "Making $num_commits commits today"

          for i in $(seq 1 $num_commits); do
            d=$(date '+%Y-%m-%dT%H:%M:%SZ')
            echo "$d (commit $i of $num_commits)" > LAST_UPDATED
            git add -A
            rand=$(( $RANDOM % ${#arr[@]} ))
            git commit -m "${arr[$rand]}"
          done

          git push https://x-access-token:${GH_PAT}@github.com/arberbakalli/CodeChecker.git HEAD:master
